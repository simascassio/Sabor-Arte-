<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Login</title>
    <link rel="stylesheet" type="text/css" href="css/Login.css">
</head>
<body>
    <header class="opcoes">
         <nav>
            <a href="#" class="text">Home</a>
            <a href="index.html" class="text">Login</a>
            <a href="#" class="text">Contato</a>
            <a href="index2.html" class="text">Cardápio</a>  
         </nav>      
    </header>
    
    <main>
        <section class="container-login">
            <h2>LOGIN</h2>
            <form>
                <label class="nome">Email</label>
                <input type="email" class="input" placeholder="Email" required>
                <label class="nome">Senha</label>
                <input type="password" class="input" placeholder="Senha" required>
                <button type="submit" class="btn">Entrar</button>
            </form>  
            <div class="cadastro">
                <p>Não tem uma conta?</p>
                <a href="#">Cadastre-se</a>
            </div>
    
            <div class="social">
                <img src="imagens/google.svg" alt="Google Login" class="img">
                <img src="imagens/fcb.svg" alt="Facebook Login" class="img">
            </div> 
        </section>

        
    </main>
</body>
</html>
